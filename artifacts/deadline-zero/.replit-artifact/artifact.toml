kind = "web"
previewPath = "/"
title = "DeadlineZero"
version = "1.0.0"
id = "artifacts/deadline-zero"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21487

[services.development]
run = "pnpm --filter @workspace/deadline-zero run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/deadline-zero", "run", "build" ]
publicDir = "artifacts/deadline-zero/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21487"
BASE_PATH = "/"
